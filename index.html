<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bored Break 3D</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <section class="hud" aria-label="Game stats">
      <div>
        <span class="label">Score</span>
        <strong id="score">0</strong>
      </div>
      <div>
        <span class="label">Best</span>
        <strong id="best">0</strong>
      </div>
      <div>
        <span class="label">Time</span>
        <strong id="time">45</strong>
      </div>
    </section>

    <section class="board-wrap">
      <div id="game" aria-label="Bored Break 3D game board"></div>
      <div id="overlay" class="overlay">
        <h1>Bored Break 3D</h1>
        <p>Collect glowing coins, dodge the ghosts, and survive for 45 seconds.</p>
        <button id="startButton" type="button">Start Game</button>
      </div>
      <div id="loading" class="loading">Loading ghost model...</div>
    </section>

    <section class="controls" aria-label="Controls">
      <button type="button" data-dir="up">Up</button>
      <div>
        <button type="button" data-dir="left">Left</button>
        <button type="button" data-dir="down">Down</button>
        <button type="button" data-dir="right">Right</button>
      </div>
      <p>Use arrow keys, WASD, or the buttons.</p>
    </section>
  </main>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="script.js"></script>
</body>
</html>
